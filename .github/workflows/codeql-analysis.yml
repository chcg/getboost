name: "CodeQL"

on:
  push:
    branches: [master, appveyor_173]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [master]
  schedule:
    - cron: '0 23 * * 6'

jobs:
  analyze:
    name: Analyze
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      with:
        # We must fetch at least the immediate parents so that if this is
        # a pull request then we can checkout the head.
        fetch-depth: 2

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v1
      # Override language selection by uncommenting this and choosing your languages
      with:
        languages: csharp

    # Autobuild attempts to build any compiled languages  (C/C++, C#, or Java).
    # If this step fails, then you should remove it and run the build manually (see below)
    #- name: Autobuild
    #  uses: github/codeql-action/autobuild@v1

    # ℹ️ Command-line programs to run using the OS shell.
    # 📚 https://git.io/JvXDl

    # ✏️ If the Autobuild fails above, remove it and uncomment the following three lines
    #    and modify them (or add more) to build your code if your project
    #    uses a compiled language

    #- run: |
    #   make bootstrap
    #   make release

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v1

    - name: Setup NuGet.exe
      uses: nuget/setup-nuget@v1

    - name: restore input nuget packages
      working-directory: builder\
      run: |
           nuget restore builder\packages.config -PackagesDirectory packages
           nuget restore builderTest\packages.config -PackagesDirectory packages

    - name: Setup to add MSBuild.exe to path
      uses: microsoft/setup-msbuild@v1

    - name: MSBuild of builder
      working-directory: builder\
      run: |
           msbuild builder.sln /m /verbosity:minimal /t:restore /p:configuration="Release" /p:platform="Any CPU"
           msbuild builder.sln /m /p:configuration="Release" /p:platform="Any CPU"


    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v1
